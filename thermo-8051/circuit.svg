<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 680" font-family="monospace" font-size="11">
  <defs>
    <style>
      text { dominant-baseline: middle; text-anchor: middle; }
      .t { font-size: 14; font-weight: bold; }
      .pn { font-size: 7; fill: #888; }
      .pn2 { font-size: 8; }
      .w { stroke: #333; stroke-width: 1.5; fill: none; }
      .wv { stroke: #c00; stroke-width: 1.8; fill: none; }
      .wg { stroke: #888; stroke-width: 1.2; fill: none; stroke-dasharray: 5,3; }
      .ws { stroke: #25c; stroke-width: 1.5; fill: none; }
      .wr { stroke: #0a8; stroke-width: 1.5; fill: none; }
      .wi { stroke: #a3c; stroke-width: 1.5; fill: none; }
      .comp { fill: #f8f8f8; stroke: #333; stroke-width: 1.5; }
      .chip { fill: #1a1a2e; stroke: #555; stroke-width: 1.5; }
      .ct { fill: #ddd; }
      .ann { font-size: 7; fill: #666; }
    </style>
  </defs>

  <!-- Title -->
  <text x="375" y="22" class="t">STC8H8K64U 溫度控制器 — USB 直連 · 極簡版</text>

  <!-- ============================================================ -->
  <!-- STC8H8K64U LQFP-32 (center, large) -->
  <!-- ============================================================ -->
  <rect x="260" y="45" width="270" height="440" rx="8" class="chip"/>
  <text x="395" y="68" class="ct" font-weight="bold" font-size="13">STC8H8K64U</text>
  <text x="395" y="84" class="ct" font-size="9">LQFP-32</text>

  <!-- LEFT side pins (1-16) -->
  <text x="268" y="110" class="pn" text-anchor="end">1</text> <text x="265" y="120" class="pn2" fill="#ddd">P1.4</text>
  <text x="268" y="140" class="pn" text-anchor="end">2</text> <text x="265" y="150" class="pn2" fill="#ddd">P1.5</text>
  <text x="268" y="172" class="pn" text-anchor="end">3</text> <text x="265" y="182" class="pn2" fill="#0f0">X32KI</text>
  <text x="268" y="204" class="pn" text-anchor="end">4</text> <text x="265" y="214" class="pn2" fill="#0f0">X32KO</text>
  <text x="268" y="236" class="pn" text-anchor="end">5</text> <text x="265" y="246" class="pn2" fill="#ddd">P5.4</text>
  <text x="268" y="268" class="pn" text-anchor="end">6</text> <text x="265" y="278" class="pn2" fill="#f66">VCC</text>
  <text x="268" y="300" class="pn" text-anchor="end">7</text> <text x="265" y="310" class="pn2" fill="#ddd">P5.5</text>
  <text x="268" y="332" class="pn" text-anchor="end">8</text> <text x="265" y="342" class="pn2" fill="#999">GND</text>
  <text x="268" y="365" class="pn" text-anchor="end">9</text> <text x="265" y="375" class="pn2" fill="#faf">P3.2</text>
  <text x="268" y="397" class="pn" text-anchor="end">10</text><text x="265" y="407" class="pn2" fill="#ddd">P3.3</text>
  <text x="268" y="430" class="pn" text-anchor="end">11</text><text x="265" y="440" class="pn2" fill="#f88">USB_D-</text>
  <text x="268" y="462" class="pn" text-anchor="end">12</text><text x="265" y="472" class="pn2" fill="#f88">USB_D+</text>
  <text x="268" y="494" class="pn" text-anchor="end">16</text><text x="265" y="504" class="pn2" fill="#ff0">P1.0/ADC</text>

  <!-- RIGHT side pins (17-32) -->
  <text x="522" y="110" class="pn" text-anchor="start">17</text> <text x="525" y="120" class="pn2" fill="#aaf">P1.2(TXD2)</text>
  <text x="522" y="140" class="pn" text-anchor="start">18</text> <text x="525" y="150" class="pn2" fill="#aaf">P1.3(RXD2)</text>
  <text x="522" y="172" class="pn" text-anchor="start">19-20</text><text x="525" y="182" class="pn2" fill="#ddd">P0.0-0.1</text>
  <text x="522" y="204" class="pn" text-anchor="start">21</text> <text x="525" y="214" class="pn2" fill="#5f5">P0.2 (OUT)</text>
  <text x="522" y="236" class="pn" text-anchor="start">22</text> <text x="525" y="246" class="pn2" fill="#aaf">P0.3 (JDY_PWR)</text>
  <text x="522" y="268" class="pn" text-anchor="start">25-26</text><text x="525" y="278" class="pn2" fill="#ddd">P0.6-0.7</text>
  <text x="522" y="300" class="pn" text-anchor="start">27-32</text><text x="525" y="310" class="pn2" fill="#ddd">P2.0-2.5</text>
  <text x="522" y="430" class="pn" text-anchor="start">15</text> <text x="525" y="440" class="pn2" fill="#ddd">P1.1</text>

  <!-- ============================================================ -->
  <!-- USB Connector -->
  <!-- ============================================================ -->
  <rect x="30" y="200" width="55" height="35" rx="5" class="comp"/>
  <text x="57" y="222" class="pn2" font-weight="bold">USB</text>

  <!-- USB D- → P3.0 (USB_D-) -->
  <line x1="85" y1="210" x2="170" y2="210" class="ws"/>
  <line x1="170" y1="210" x2="170" y2="435" class="ws"/>
  <line x1="170" y1="435" x2="260" y2="435" class="ws"/>
  <text x="135" y="203" font-size="8" fill="#25c">D-</text>

  <!-- USB D+ → P3.1 (USB_D+) -->
  <line x1="85" y1="225" x2="150" y2="225" class="ws"/>
  <line x1="150" y1="225" x2="150" y2="465" class="ws"/>
  <line x1="150" y1="465" x2="260" y2="465" class="ws"/>
  <text x="120" y="218" font-size="8" fill="#25c">D+</text>

  <!-- USB 5V → VCC (via Schottky) -->
  <line x1="85" y1="195" x2="110" y2="195" class="wv"/>
  <text x="98" y="188" class="ann" fill="#c00">D</text>
  <line x1="110" y1="195" x2="110" y2="170" class="wv"/>
  <line x1="110" y1="170" x2="450" y2="170" class="wv"/>
  <text x="280" y="163" font-size="8" fill="#c00">VCC_BUS</text>

  <!-- USB GND -->
  <line x1="85" y1="235" x2="450" y2="235" class="wg"/>

  <!-- VCC to MCU -->
  <line x1="450" y1="170" x2="450" y2="273" class="wv"/>
  <line x1="450" y1="273" x2="260" y2="273" class="wv"/>

  <!-- GND to MCU -->
  <line x1="450" y1="235" x2="450" y2="337" class="wg"/>
  <line x1="450" y1="337" x2="260" y2="337" class="wg"/>

  <!-- ============================================================ -->
  <!-- CR2032 Battery (power OR with USB) -->
  <!-- ============================================================ -->
  <rect x="355" y="130" width="50" height="22" rx="6" fill="#eee" stroke="#333" stroke-width="1.5"/>
  <text x="380" y="145" class="ann">CR2032</text>
  <text x="380" y="163" font-size="6" fill="#666">3V 225mAh</text>

  <!-- Battery + → VCC_BUS via Schottky -->
  <line x1="380" y1="130" x2="380" y2="118" class="wv"/>
  <text x="372" y="125" class="ann" fill="#c00">D</text>
  <line x1="380" y1="118" x2="380" y2="110" class="wv"/>
  <line x1="380" y1="110" x2="110" y2="110" class="wv"/>
  <line x1="110" y1="110" x2="110" y2="170" class="wv"/>

  <!-- Battery - → GND -->
  <line x1="330" y1="141" x2="315" y2="141" class="wg"/>
  <line x1="315" y1="141" x2="315" y2="235" class="wg"/>

  <!-- ============================================================ -->
  <!-- P3.2 ISP Button (first-time flash only) -->
  <!-- ============================================================ -->
  <line x1="260" y1="370" x2="200" y2="370" class="wi"/>
  <circle cx="185" cy="370" r="10" fill="#fff" stroke="#a3c" stroke-width="1.5"/>
  <text x="185" y="373" font-size="7" fill="#a3c">BTN</text>
  <line x1="175" y1="370" x2="175" y2="390" class="wg"/>

  <!-- 10K pull-up to VCC -->
  <rect x="220" y="390" width="5" height="20" fill="#fff" stroke="#a3c" stroke-width="1"/>
  <text x="235" y="402" font-size="6" fill="#a3c">10K</text>
  <line x1="222" y1="400" x2="210" y2="400" class="wi"/>
  <line x1="210" y1="400" x2="210" y2="370" class="wi"/>
  <line x1="210" y1="370" x2="215" y2="370" class="wi"/>
  <line x1="222" y1="410" x2="265" y2="410" class="wv"/>
  <line x1="265" y1="410" x2="265" y2="273" class="wv"/>

  <text x="185" y="418" font-size="7" fill="#a3c">僅第一次用</text>

  <!-- ============================================================ -->
  <!-- 32.768KHz RTC Crystal -->
  <!-- ============================================================ -->
  <line x1="260" y1="177" x2="205" y2="177" class="wr"/>
  <line x1="260" y1="209" x2="205" y2="209" class="wr"/>
  <rect x="170" y="168" width="35" height="47" rx="8" class="comp"/>
  <text x="187" y="188" font-size="6">32.768</text>
  <text x="187" y="198" font-size="6">KHz</text>
  <!-- Load caps -->
  <line x1="175" y1="193" x2="175" y2="215" class="wg"/>
  <text x="168" y="204" font-size="5" fill="#0a8">12p</text>
  <line x1="175" y1="215" x2="205" y2="215" class="wg"/>
  <text x="155" y="160" font-size="8" fill="#0a8" font-weight="bold">RTC 晶振</text>

  <!-- ============================================================ -->
  <!-- JDY-23 BLE Module -->
  <!-- ============================================================ -->
  <rect x="570" y="100" width="150" height="110" rx="6" class="chip"/>
  <text x="645" y="120" class="ct" font-weight="bold">JDY-23</text>
  <text x="645" y="136" class="ct" font-size="9">BLE UART</text>

  <text x="575" y="160" class="pn2" fill="#ddd">TX</text>
  <text x="575" y="185" class="pn2" fill="#ddd">RX</text>
  <text x="575" y="200" class="pn2" fill="#ddd">VCC</text>
  <text x="680" y="200" class="pn2" fill="#999" text-anchor="end">GND</text>

  <!-- JDY-23 VCC via P-MOSFET switch (P0.3 gate) -->
  <!-- AO3401 P-MOSFET -->
  <rect x="535" y="250" width="28" height="38" rx="3" class="comp"/>
  <text x="549" y="266" font-size="6">P-MOS</text>
  <text x="549" y="278" font-size="6">AO3401</text>
  <!-- Source → VCC_BUS -->
  <line x1="549" y1="250" x2="549" y2="235" class="wv"/>
  <line x1="549" y1="235" x2="480" y2="235" class="wv"/>
  <line x1="480" y1="235" x2="480" y2="170" class="wv"/>
  <!-- Gate ← P0.3 via 1K -->
  <line x1="549" y1="288" x2="549" y2="310" class="ws"/>
  <rect x="546" y="310" width="6" height="25" fill="#fff" stroke="#25c" stroke-width="1"/>
  <text x="560" y="325" font-size="6" fill="#25c">1K</text>
  <line x1="549" y1="335" x2="549" y2="360" class="ws"/>
  <line x1="549" y1="360" x2="530" y2="360" class="ws"/>
  <text x="580" y="355" font-size="6" fill="#25c">←P0.3</text>
  <!-- 10K Gate pull-up (off by default) -->
  <rect x="520" y="270" width="5" height="18" fill="#fff" stroke="#25c" stroke-width="1"/>
  <text x="510" y="282" font-size="5" fill="#25c">10K</text>
  <line x1="522" y1="279" x2="535" y2="279" class="ws"/>
  <line x1="522" y1="270" x2="522" y2="250" class="wv"/>
  <!-- Drain → JDY-23 VCC -->
  <line x1="563" y1="269" x2="575" y2="269" class="wv"/>
  <line x1="575" y1="269" x2="575" y2="200" class="wv"/>
  <text x="585" y="238" font-size="6" fill="#c00">VCC(switched)</text>

  <!-- JDY-23 GND -->
  <line x1="720" y1="200" x2="750" y2="200" class="wg"/>

  <!-- JDY-23 TX → MCU P1.3 (RXD2) -->
  <line x1="570" y1="160" x2="540" y2="160" class="ws"/>
  <line x1="540" y1="160" x2="540" y2="145" class="ws"/>
  <line x1="540" y1="145" x2="530" y2="145" class="ws"/>
  <text x="550" y="168" font-size="7" fill="#25c">TX→P1.3</text>

  <!-- JDY-23 RX ← MCU P1.2 (TXD2) -->
  <line x1="570" y1="185" x2="545" y2="185" class="ws"/>
  <line x1="545" y1="185" x2="545" y2="115" class="ws"/>
  <line x1="545" y1="115" x2="530" y2="115" class="ws"/>
  <text x="555" y="152" font-size="7" fill="#25c">RX←P1.2</text>

  <!-- ============================================================ -->
  <!-- NTC Temperature Sensor -->
  <!-- ============================================================ -->
  <!-- VCC → 100K → P1.0 → NTC → GND -->
  <line x1="450" y1="170" x2="450" y2="520" class="wv"/>
  <rect x="447" y="520" width="6" height="30" fill="#fff" stroke="#c00" stroke-width="1"/>
  <text x="462" y="538" font-size="7" fill="#c00">100K</text>
  <line x1="450" y1="550" x2="450" y2="570" class="ws"/>
  <line x1="450" y1="570" x2="260" y2="570" class="ws"/>
  <line x1="260" y1="570" x2="260" y2="499" class="ws"/>

  <!-- NTC symbol -->
  <path d="M230,570 L240,555 L245,575 L250,555 L255,575 L260,555 L265,575 L270,555 L280,565" fill="none" stroke="#25c" stroke-width="1.5"/>
  <line x1="280" y1="570" x2="290" y2="570" class="ws"/>
  <line x1="290" y1="570" x2="290" y2="590" class="wg"/>

  <text x="350" y="562" font-size="8" fill="#25c" text-anchor="start">NTC 100K B=3950</text>

  <!-- ============================================================ -->
  <!-- AO3400 MOSFET Output -->
  <!-- ============================================================ -->
  <!-- P0.2 → 1K → AO3400 Gate -->
  <line x1="530" y1="209" x2="570" y2="209" class="ws"/>
  <rect x="570" y="206" width="6" height="25" fill="#fff" stroke="#25c" stroke-width="1"/>
  <text x="580" y="221" font-size="7" fill="#25c">1K</text>
  <line x1="576" y1="231" x2="590" y2="231" class="ws"/>

  <!-- AO3400 N-MOSFET -->
  <rect x="590" y="210" width="30" height="40" rx="3" class="comp"/>
  <text x="605" y="228" font-size="7">N-MOS</text>
  <text x="605" y="240" font-size="6">AO3400</text>

  <!-- Gate -->
  <line x1="590" y1="231" x2="590" y2="230" class="ws"/>
  <!-- Source → GND -->
  <line x1="605" y1="250" x2="605" y2="270" class="wg"/>
  <!-- Drain → Load -->
  <line x1="605" y1="210" x2="605" y2="190" class="ws"/>
  <text x="605" y="185" font-size="8" fill="#25c">LOAD+</text>

  <!-- Load icon -->
  <rect x="585" y="155" width="40" height="25" rx="5" fill="#fff" stroke="#25c" stroke-width="1"/>
  <text x="605" y="168" font-size="7" fill="#25c">風扇/加熱</text>
  <line x1="585" y1="167" x2="560" y2="167" class="wv"/>
  <text x="572" y="160" font-size="6" fill="#c00">VCC</text>

  <!-- ============================================================ -->
  <!-- Legend Box -->
  <!-- ============================================================ -->
  <rect x="30" y="600" width="690" height="75" rx="6" fill="#fafafa" stroke="#ddd" stroke-width="1"/>

  <text x="45" y="616" font-size="11" font-weight="bold" fill="#333" text-anchor="start">USB 直連 — 零 CH340 — 極簡電路</text>

  <text x="45" y="634" font-size="9" fill="#555" text-anchor="start">第一次燒錄(空晶片): 按住 P3.2 按鈕→插 USB→./burn.sh --first→放開按鈕。MCU 進入內建 USB Bootloader(pull-up 電阻已在 MCU 內部)</text>
  <text x="45" y="650" font-size="9" fill="#a3c" text-anchor="start">之後每次燒錄: ./burn.sh → 透過 USB CDC 送 "!ISP" → MCU 軟體重啟進入 Bootloader → stc8prog 燒錄 → 自動重啟跑新韌體 (完全自動)</text>

  <text x="45" y="666" font-size="9" fill="#555" text-anchor="start">紅:VCC │ 灰虛線:GND │ 藍:UART/GPIO訊號 │ 紫:ISP按鈕 │ 綠:RTC晶振 │ 青色:JDY-23電源MOSFET開關</text>
  <text x="45" y="680" font-size="9" fill="#555" text-anchor="start">JDY-23廣播策略: 平時斷電(0μA)。每60秒通電3秒→AT+NAME更新裝置名為"G:24.5C"→手機掃描即可看到溫度(不需連線)。若手機連線(有UART活動)自動延長25秒。</text>
</svg>
